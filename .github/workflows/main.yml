name: Build and Deploy StardewWasm to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Clean build
        run: dotnet clean wasm/StardewWasmBrowser/StardewWasmBrowser.csproj -c Release

      - name: Publish WASM project
        run: dotnet publish wasm/StardewWasmBrowser/StardewWasmBrowser.csproj -c Release -o output

      - name: Ensure .nojekyll exists
        run: touch output/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
