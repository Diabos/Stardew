<!DOCTYPE html>
<html>

<head>
  <title>Stardew Valley WebAssembly</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="coi-serviceworker.min.js"></script>
  <style>
      body { margin: 0; padding: 0; background-color: #222; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
      canvas { display: none; image-rendering: pixelated; max-width: 100%; max-height: 100vh; box-shadow: 0 0 20px black; }
      #setup-container { text-align: center; background: #333; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
      #drop-zone { border: 2px dashed #666; padding: 3rem; margin: 1.5rem 0; border-radius: 8px; cursor: pointer; transition: 0.2s; }
      #drop-zone.dragover { border-color: #4CAF50; background: #2e4a2e; }
       #out { margin-top: 1rem; font-family: monospace; color: #aaa; }
      #progress-container { width: 100%; height: 10px; background: #444; border-radius: 5px; margin: 1.5rem 0; overflow: hidden; display: none; }
      #progress-bar { width: 0%; height: 100%; background: #4CAF50; transition: width 0.3s; }
      #percentage { font-weight: bold; color: #4CAF50; }
      button { padding: 10px 20px; font-size: 1.1rem; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
      button:disabled { background: #555; cursor: not-allowed; }
  </style>
  <script type='module' src="./main.js"></script>
</head>

<body>
  <div id="setup-container">
      <div id="download-zone" style="margin: 2rem 0;">
          <h2 style="color: #4CAF50;">Syncing Cloud Assets <span id="percentage">0%</span></h2>
          <p style="font-size: 0.9rem; color: #ccc;">Synchronizing 500MB of high-fidelity game data...</p>
          <div id="progress-container"><div id="progress-bar"></div></div>
      </div>
      <button id="start-btn" disabled>Waiting for assets...</button>
      <div id="out">Checking storage...</div>
  </div>

  <canvas id="canvas"></canvas>
</body>

</html>
